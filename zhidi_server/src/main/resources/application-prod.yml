spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zhidi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USER:zhidi}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: BINARY
        dialect: org.hibernate.dialect.MySQLDialect

auth:
  sms:
    hmac-secret: ${SMS_CODE_HMAC_SECRET}
  jwt:
    secret: ${AUTH_JWT_SECRET}
    ttl: PT720H

server:
  port: ${SERVER_PORT:8080}

zhidi:
  upload:
    root: ${ZHIDI_UPLOAD_ROOT:/opt/zhidi/uploads}
    max-image-bytes: 10485760

logging:
  level:
    root: WARN
    com.zhidi: INFO
  file:
    path: /opt/zhidi/logs
