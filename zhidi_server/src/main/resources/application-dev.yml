spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:h2:mem:zhidi;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        type:
                 preferred_uuid_jdbc_type: BINARY

auth:
  sms:
    hmac-secret: ${SMS_CODE_HMAC_SECRET:dev-only-sms-code-secret-change-me}
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-only-jwt-signing-secret-change-me}
    ttl: PT720H
