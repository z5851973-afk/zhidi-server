spring:
  application:
    name: zhidi-server
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

zhidi:
  upload:
    root: ${ZHIDI_UPLOAD_ROOT:./uploads}
    max-image-bytes: 10485760
